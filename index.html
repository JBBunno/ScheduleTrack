
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Palm Crest SRD</title>
<style>
/* ── Reset & base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1e35;
  --navy-mid:#162a47;
  --navy-light:#1e3a5f;
  --teal:#5ab4d4;
  --teal-dark:#3a94b4;
  --amber:#e89820;
  --amber-dark:#c07810;
  --green:#28a86e;
  --red:#d94040;
  --red-bg:#fdf0f0;
  --amber-bg:#fdf6e8;
  --green-bg:#eef9f4;
  --text:#1a2535;
  --text-secondary:#4a5a70;
  --text-muted:#8494a8;
  --border:#dde4ed;
  --surface:#f4f6fa;
  --white:#ffffff;
  --radius:10px;
  --shadow:0 1px 4px rgba(13,30,53,.08);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text);font-size:15px;line-height:1.5}

/* ── App shell ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--white);position:relative}
@media(min-width:768px){
  body{background:var(--navy)}
  .app{height:100vh;box-shadow:0 0 40px rgba(0,0,0,.3)}
}

/* ── Top bar ── */
.topbar{background:var(--navy);color:var(--white);padding:12px 16px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.topbar-row1{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);opacity:.9}
.logout-btn{font-size:12px;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;padding:2px 6px}
.topbar-row2{display:flex;align-items:center;justify-content:space-between}
.shut-name{font-size:18px;font-weight:700;color:var(--white);letter-spacing:-.01em}
.weeks-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--amber);color:var(--navy)}
.topbar-row3{display:flex;align-items:center;justify-content:space-between}
.readiness-label{font-size:11px;color:rgba(255,255,255,.5)}
.readiness-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 10px}
.readiness-bar{height:4px;border-radius:2px;background:var(--amber);transition:width .4s}
.readiness-pct{font-size:12px;font-weight:600;color:var(--amber)}
.user-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6)}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

/* ── Nav tabs ── */
.nav{display:flex;background:var(--navy-mid);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:60px;padding:10px 4px 8px;font-size:11px;font-weight:500;color:rgba(255,255,255,.45);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.02em;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* ── Views ── */
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;display:none}
.view.active{display:block}

/* ── Dashboard ── */
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
.metric-val{font-size:26px;font-weight:700;letter-spacing:-.02em}
.metric-val.warning{color:var(--amber-dark)}
.metric-val.danger{color:var(--red)}
.metric-val.success{color:var(--green)}
.metric-val.neutral{color:var(--navy)}
.metric-sub{font-size:11px;color:var(--text-muted);margin-top:1px}

.section-label{padding:12px 14px 6px;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}

.kpi-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:6px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kpi-dot.overdue{background:var(--red)}
.kpi-dot.soon{background:var(--amber)}
.kpi-dot.ok{background:var(--green)}
.kpi-dot.future{background:var(--border)}
.kpi-info{flex:1;min-width:0}
.kpi-name{font-size:13px;font-weight:500;color:var(--text)}
.kpi-cat{font-size:11px;color:var(--text-muted)}
.kpi-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.kpi-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.kpi-badge.overdue{background:var(--red-bg);color:var(--red)}
.kpi-badge.soon{background:var(--amber-bg);color:var(--amber-dark)}
.kpi-badge.ok{background:var(--green-bg);color:var(--green)}
.kpi-badge.future{background:var(--surface);color:var(--text-muted)}
.kpi-week{font-size:10px;color:var(--text-muted)}

/* ── Checklist ── */
.role-filter-wrap{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:5}
.role-filter-wrap::-webkit-scrollbar{display:none}
.role-chip{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .12s}
.role-chip.active{background:var(--navy);color:var(--white);border-color:var(--navy)}

.task-group-header{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:49px;z-index:4}
.task-group-header:first-child{border-top:none}
.tgh-name{font-size:12px;font-weight:600;color:var(--navy);letter-spacing:.01em}
.tgh-progress{display:flex;align-items:center;gap:8px}
.tgh-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tgh-bar{height:4px;border-radius:2px;background:var(--teal)}
.tgh-pct{font-size:11px;color:var(--text-muted)}

.task-item{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:11px;cursor:pointer;background:var(--white);transition:background .1s;-webkit-user-select:none;user-select:none}
.task-item:active{background:var(--surface)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.behind{background:var(--red);border-color:var(--red)}
.task-check svg{width:11px;height:11px;stroke:white;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;color:var(--text);line-height:1.35}
.task-title.done-text{text-decoration:line-through;color:var(--text-muted)}
.task-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.kpi-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(90,180,212,.12);color:var(--teal-dark);font-weight:500}
.week-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--surface);color:var(--text-secondary);flex-shrink:0;white-space:nowrap}
.week-badge.overdue{background:var(--red-bg);color:var(--red)}

/* ── Actions ── */
.actions-header{display:flex;align-items:center;padding:10px 14px;gap:8px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:5}
.actions-header select{flex:1;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text)}
.add-action-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;background:var(--navy);color:var(--white);border:none;cursor:pointer;white-space:nowrap;flex-shrink:0}

.action-card{margin:10px 14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--white)}
.action-card-body{padding:11px 13px}
.action-priority-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.priority-dot{width:6px;height:6px;border-radius:50%}
.priority-dot.high{background:var(--red)}
.priority-dot.medium{background:var(--amber)}
.priority-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.priority-label.high{color:var(--red)}
.priority-label.medium{color:var(--amber-dark)}
.action-text{font-size:13px;color:var(--text);line-height:1.4}
.action-footer{padding:8px 13px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text-muted);flex-wrap:wrap}
.action-footer strong{color:var(--text-secondary)}
.overdue-tag{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}

/* ── Progress ── */
.prog-summary{padding:14px;display:flex;flex-direction:column;gap:10px}
.role-row{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.role-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.role-row-name{font-size:13px;font-weight:600;color:var(--navy)}
.role-row-pct{font-size:14px;font-weight:700}
.role-row-pct.danger{color:var(--red)}
.role-row-pct.warning{color:var(--amber-dark)}
.role-row-pct.success{color:var(--green)}
.role-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}
.role-bar{height:6px;border-radius:3px;transition:width .5s}
.role-row-meta{display:flex;gap:12px;font-size:11px;color:var(--text-muted)}
.role-row-meta span strong{color:var(--text-secondary)}

/* ── Login ── */
.login-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
.login-logo{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;font-weight:600}
.login-title{font-size:24px;font-weight:700;color:var(--white);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:36px;text-align:center}
.pin-display{display:flex;gap:10px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:all .15s}
.pin-dot.filled{background:var(--teal);border-color:var(--teal)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px}
.pin-key{height:60px;background:var(--navy-mid);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);font-size:22px;font-weight:500;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;-webkit-user-select:none;user-select:none}
.pin-key:active{background:var(--navy-light)}
.pin-key.delete{font-size:16px;color:rgba(255,255,255,.5)}
.pin-error{color:var(--red);font-size:13px;margin-top:14px;text-align:center;min-height:20px}

/* ── Modal (add action) ── */
.modal-overlay{position:absolute;inset:0;background:rgba(13,30,53,.55);display:none;align-items:flex-end;z-index:50}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--white);border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;display:flex;flex-direction:column;gap:12px}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-sheet label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:4px}
.modal-sheet input,.modal-sheet select,.modal-sheet textarea{width:100%;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text);font-family:inherit}
.modal-sheet textarea{resize:none;height:72px;line-height:1.4}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--white);font-size:14px;color:var(--text-secondary);cursor:pointer;font-weight:500}
.modal-save{flex:2;padding:12px;border:none;border-radius:8px;background:var(--navy);font-size:14px;color:var(--white);cursor:pointer;font-weight:600}

/* ── Spinner / states ── */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text-muted);font-size:13px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:40px 24px;color:var(--text-muted);font-size:13px}

/* ── Utility ── */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">Palm Crest</div>
  <div class="login-title">Shutdown Readiness</div>
  <div class="login-sub">Enter your PIN to continue</div>
  <div class="pin-display" id="pinDisplay">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key" onclick="pinPress('')"></div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key delete" onclick="pinDelete()">⌫</div>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- MAIN APP -->
<div class="app hidden" id="mainApp">

  <div class="topbar">
    <div class="topbar-row1">
      <div class="app-title">Palm Crest SRD</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="topbar-row2">
      <div class="shut-name" id="shutName">Loading…</div>
      <div class="weeks-pill" id="weeksPill">W—</div>
    </div>
    <div class="topbar-row3">
      <div class="user-chip"><div class="user-dot"></div><span id="userChip"></span></div>
      <div style="display:flex;align-items:center;gap:6px;flex:1;margin:0 10px">
        <div class="readiness-bar-wrap"><div class="readiness-bar" id="readinessBar" style="width:0%"></div></div>
      </div>
      <div class="readiness-pct" id="readinessPct">0%</div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-tab active" onclick="showTab('dashboard',this)" id="tab-dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-tab" onclick="showTab('checklist',this)" id="tab-checklist">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Checklist
    </div>
    <div class="nav-tab" onclick="showTab('actions',this)" id="tab-actions">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Actions
    </div>
    <div class="nav-tab" onclick="showTab('progress',this)" id="tab-progress">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Progress
    </div>
  </div>

  <div class="views">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="metrics-grid" id="metricsGrid">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
      <div class="section-label">KPI milestones</div>
      <div class="kpi-list" id="kpiList"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>

    <!-- CHECKLIST -->
    <div class="view" id="view-checklist">
      <div class="role-filter-wrap" id="roleFilterWrap"></div>
      <div id="taskListContainer"></div>
    </div>

    <!-- ACTIONS -->
    <div class="view" id="view-actions">
      <div class="actions-header">
        <select id="actionFilter" onchange="renderActions()">
          <option value="">All priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
        </select>
        <button class="add-action-btn" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add action
        </button>
      </div>
      <div id="actionListContainer"></div>
    </div>

    <!-- PROGRESS -->
    <div class="view" id="view-progress">
      <div class="prog-summary" id="progressContainer"></div>
    </div>

  </div>

  <!-- Add Action Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
      <div class="modal-title">New action</div>
      <div>
        <label>Description</label>
        <textarea id="newActionDesc" placeholder="Describe the action required…"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label>Priority</label>
          <select id="newActionPriority"><option>Medium</option><option>High</option><option>Low</option></select>
        </div>
        <div>
          <label>Week due</label>
          <select id="newActionWeek">
            <option value="-6">W-6</option><option value="-5">W-5</option>
            <option value="-4">W-4</option><option value="-3">W-3</option>
            <option value="-2" selected>W-2</option><option value="-1">W-1</option>
            <option value="0">Shutdown</option><option value="1">W+1</option>
          </select>
        </div>
      </div>
      <div>
        <label>Area / equipment</label>
        <input type="text" id="newActionArea" placeholder="e.g. RC901, CV902">
      </div>
      <div>
        <label>Assigned to</label>
        <input type="text" id="newActionAssigned" placeholder="Name">
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-save" onclick="saveAction()">Save action</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── Config ───────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVYxYAqO3sDxI5PGo-4gJiyo_c79av4QMQs1SX4747pv-QOQX3J2ZXIKmo9XuNJniz/exec';
const DEMO_MODE = GAS_URL.includes('YOUR_GAS'); // auto-detects placeholder

// ── Demo data (used when GAS not yet deployed) ───────────────
const DEMO_USERS = {
  '1001': { ok:true, userId:'U001', name:'Shut Coordinator', role:'Shut Coordinator' },
  '1002': { ok:true, userId:'U002', name:'Shut Planner',     role:'Shut Planner' },
  '1003': { ok:true, userId:'U003', name:'Shut Scheduler',   role:'Shut Scheduler' },
  '1004': { ok:true, userId:'U004', name:'Permit Hut',       role:'Permit Hut' },
  '1005': { ok:true, userId:'U005', name:'Maint Sup',        role:'Maint Sup' },
  '1006': { ok:true, userId:'U006', name:'HSES',             role:'HSES' },
  '1007': { ok:true, userId:'U007', name:'Mat. Logistics',   role:'Material Logistics' },
  '1008': { ok:true, userId:'U008', name:'Planning Supt',    role:'Planning Superintendent' },
  '9999': { ok:true, userId:'U999', name:'Admin',            role:'Admin' },
};

// ── PIN auth ─────────────────────────────────────────────────
let pinBuffer = '';

function pinPress(digit) {
  if (!digit || pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(submitPin, 120);
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

async function submitPin() {
  document.getElementById('pinError').textContent = 'Checking…';
  try {
    const res = await api({ action: 'login', pin: pinBuffer });
    if (res.ok) {
      currentUser = res;
      sessionStorage.setItem('srdUser', JSON.stringify(res));
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      initApp();
    } else {
      document.getElementById('pinError').textContent = 'Incorrect PIN — try again';
      pinBuffer = '';
      updatePinDots();
    }
  } catch(e) {
    document.getElementById('pinError').textContent = 'Error: ' + e.message;
    pinBuffer = '';
    updatePinDots();
  }
}

function logout() {
  sessionStorage.removeItem('srdUser');
  currentUser = null;
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pinError').textContent = '';
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ── API helper — GET-based for GAS CORS compatibility ────────
async function api(body) {
  if (DEMO_MODE) return demoApi(body);
  const qs = new URLSearchParams(body).toString();
  const r = await fetch(GAS_URL + '?' + qs, { redirect: 'follow' });
  const text = await r.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error('Bad response: ' + text.substring(0,120)); }
  // dummy to satisfy original structure
}

function demoApi(body) {
  const { action } = body;
  if (action === 'login') {
    const u = DEMO_USERS[String(body.pin)];
    return Promise.resolve(u || { ok: false, error: 'Invalid PIN' });
  }
  if (action === 'getConfig')   return Promise.resolve(DEMO_CONFIG);
  if (action === 'getTasks')    return Promise.resolve(DEMO_TASKS);
  if (action === 'getKPIs')     return Promise.resolve(DEMO_KPIS);
  if (action === 'getActions')  return Promise.resolve([...DEMO_ACTIONS, ...actions.filter(a => a._local)]);
  if (action === 'getStatuses') {
    return Promise.resolve(Object.entries(demoStatuses).map(([taskId, s]) => ({
      taskId, status: s.status, userName: s.userName
    })));
  }
  if (action === 'setStatus') {
    demoStatuses[body.taskId] = { status: body.status, userName: body.userName };
    return Promise.resolve({ ok: true });
  }
  if (action === 'addAction') {
    const id = 'ACT-' + Date.now();
    actions.push({ actionId: id, status: 'Open', priority: body.priority,
      area: body.area, weekDue: body.weekDue, description: body.description,
      assignedTo: body.assignedTo, daysLeft: 0, _local: true });
    return Promise.resolve({ ok: true, id });
  }
  return Promise.resolve({ ok: true });
}

// ── App init ─────────────────────────────────────────────────
async function initApp() {
  const stored = sessionStorage.getItem('srdUser');
  if (stored && !currentUser) {
    currentUser = JSON.parse(stored);
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
  }
  if (!currentUser) return;

  document.getElementById('userChip').textContent = currentUser.name + ' · ' + currentUser.role;

  // Show admin-only tab indicator (none on mobile for now)
  if (currentUser.role !== 'Admin') {
    // restrict to own role on checklist by default
    activeRole = currentUser.role;
  }

  await loadAll();
}

async function loadAll() {
  const [cfg, t, s, k, a] = await Promise.all([
    api({ action: 'getConfig' }),
    api({ action: 'getTasks' }),
    api({ action: 'getStatuses' }),
    api({ action: 'getKPIs' }),
    api({ action: 'getActions' }),
  ]);

  config = cfg;
  tasks = t;
  kpis = k;
  actions = a;

  // Build status map (merge GAS/demo data with any in-memory demo changes)
  statuses = {};
  s.forEach(r => { statuses[r.taskId] = { status: r.status, userName: r.userName }; });
  if (DEMO_MODE) Object.entries(demoStatuses).forEach(([id,v]) => { statuses[id] = v; });

  // Compute weeks out
  const start = new Date(config.startDate);
  const now = new Date();
  weeksOut = Math.round((start - now) / (7 * 24 * 60 * 60 * 1000));

  // Top bar
  document.getElementById('shutName').textContent = config.shutdownName || 'Shutdown';
  document.getElementById('weeksPill').textContent = weeksOut >= 0 ? 'W-' + weeksOut : 'W+' + Math.abs(weeksOut);
  document.getElementById('weeksPill').style.background = weeksOut <= 2 ? 'var(--red)' : weeksOut <= 5 ? 'var(--amber)' : 'var(--amber)';

  // Readiness
  const done = Object.values(statuses).filter(s => s.status === 'done').length;
  const total = tasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('readinessBar').style.width = pct + '%';
  document.getElementById('readinessPct').textContent = pct + '%';

  renderDashboard();
  renderChecklist();
  renderActions();
  renderProgress();
}

// ── Dashboard ────────────────────────────────────────────────
function renderDashboard() {
  const done = Object.values(statuses).filter(s => s.status === 'done').length;
  const total = tasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const behind = Object.values(statuses).filter(s => s.status === 'behind').length;
  const targetPct = weeksOut >= 12 ? 0 : weeksOut <= 0 ? 100 : Math.round((1 - weeksOut / 12) * 100);
  const variance = pct - targetPct;

  const openActions = actions.filter(a => a.status === 'Open' || a.status === 'Overdue').length;

  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Readiness</div>
      <div class="metric-val ${pct < 50 ? 'warning' : 'success'}">${pct}%</div>
      <div class="metric-sub">${done} of ${total} tasks done</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Variance</div>
      <div class="metric-val ${variance < -20 ? 'danger' : variance < 0 ? 'warning' : 'success'}">${variance >= 0 ? '+' : ''}${variance}%</div>
      <div class="metric-sub">vs ${targetPct}% target</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Weeks out</div>
      <div class="metric-val ${weeksOut <= 2 ? 'danger' : 'neutral'}">${weeksOut >= 0 ? weeksOut : Math.abs(weeksOut)}</div>
      <div class="metric-sub">${weeksOut >= 0 ? 'weeks to shutdown' : 'weeks post shutdown'}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Open actions</div>
      <div class="metric-val ${openActions > 0 ? 'danger' : 'success'}">${openActions}</div>
      <div class="metric-sub">${behind} tasks behind</div>
    </div>
  `;

  // KPIs
  const kpiHtml = kpis.map(k => {
    const weeksRemain = k.weekDue - (-weeksOut); // weekDue is negative (e.g. -7)
    let cls = 'future', label = 'W' + k.weekDue;
    if (Number(k.actualPct) >= 100) { cls = 'ok'; label = 'Done'; }
    else if (k.daysLeft < 0) { cls = 'overdue'; label = 'Overdue'; }
    else if (k.daysLeft < 14) { cls = 'soon'; label = 'Due soon'; }
    return `<div class="kpi-card">
      <div class="kpi-dot ${cls}"></div>
      <div class="kpi-info">
        <div class="kpi-name">${k.name}</div>
        <div class="kpi-cat">${k.category}</div>
      </div>
      <div class="kpi-right">
        <span class="kpi-badge ${cls}">${label}</span>
        <span class="kpi-week">W${k.weekDue}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('kpiList').innerHTML = kpiHtml || '<div class="empty-state">No KPIs loaded</div>';
}

// ── Checklist ────────────────────────────────────────────────
function renderChecklist() {
  const roles = [...new Set(tasks.map(t => t.role))];

  // Role filter
  const isMyRole = currentUser.role !== 'Admin';
  let filterHtml = `<button class="role-chip ${activeRole === 'all' ? 'active' : ''}" onclick="setRole('all')">All roles</button>`;
  roles.forEach(r => {
    filterHtml += `<button class="role-chip ${activeRole === r ? 'active' : ''}" onclick="setRole('${r}')">${r}</button>`;
  });
  document.getElementById('roleFilterWrap').innerHTML = filterHtml;

  const visibleRoles = activeRole === 'all' ? roles : [activeRole];
  let html = '';

  visibleRoles.forEach(role => {
    const roleTasks = tasks.filter(t => t.role === role);
    const donePct = roleTasks.length ? Math.round(roleTasks.filter(t => statuses[t.taskId]?.status === 'done').length / roleTasks.length * 100) : 0;
    const barColor = donePct >= 70 ? 'var(--green)' : donePct >= 40 ? 'var(--amber)' : 'var(--teal)';

    html += `<div class="task-group-header">
      <span class="tgh-name">${role}</span>
      <div class="tgh-progress">
        <div class="tgh-bar-wrap"><div class="tgh-bar" style="width:${donePct}%;background:${barColor}"></div></div>
        <span class="tgh-pct">${donePct}%</span>
      </div>
    </div>`;

    roleTasks.forEach(t => {
      const st = statuses[t.taskId];
      const s = st?.status || 'none';
      const isDone = s === 'done';
      const isBehind = s === 'behind';
      const canEdit = currentUser.role === 'Admin' || currentUser.role === role;
      const weekLabel = 'W' + (t.weekDue >= 0 ? '+' + t.weekDue : t.weekDue);
      const isOverdue = Number(t.weekDue) > -weeksOut && !isDone;

      let checkHtml = '';
      if (isDone) checkHtml = `<div class="task-check done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>`;
      else if (isBehind) checkHtml = `<div class="task-check behind"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
      else checkHtml = `<div class="task-check"></div>`;

      html += `<div class="task-item" onclick="${canEdit ? `toggleStatus('${t.taskId}','${role}')` : ''}">
        ${checkHtml}
        <div class="task-body">
          <div class="task-title ${isDone ? 'done-text' : ''}">${t.description}</div>
          <div class="task-meta">
            <span>Dur: ${t.duration} wk${t.duration != 1 ? 's' : ''}</span>
            ${t.kpiLink ? `<span class="kpi-tag">${t.kpiLink}</span>` : ''}
            ${st ? `<span style="color:var(--text-muted)">· ${st.userName || ''}</span>` : ''}
          </div>
        </div>
        <span class="week-badge ${isOverdue && !isDone ? 'overdue' : ''}">${weekLabel}</span>
      </div>`;
    });
  });

  document.getElementById('taskListContainer').innerHTML = html || '<div class="empty-state">No tasks to show</div>';
}

function setRole(r) {
  activeRole = r;
  renderChecklist();
}

async function toggleStatus(taskId, role) {
  if (currentUser.role !== 'Admin' && currentUser.role !== role) return;
  const current = statuses[taskId]?.status || 'none';
  const next = current === 'none' ? 'done' : current === 'done' ? 'behind' : 'none';
  statuses[taskId] = { status: next, userName: currentUser.name };

  const done = Object.values(statuses).filter(s => s.status === 'done').length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
  document.getElementById('readinessBar').style.width = pct + '%';
  document.getElementById('readinessPct').textContent = pct + '%';

  renderChecklist();
  if (activeRole === role || activeRole === 'all') renderProgress();

  await api({ action: 'setStatus', taskId, status: next, userId: currentUser.userId, userName: currentUser.name });
}

// ── Actions ──────────────────────────────────────────────────
function renderActions() {
  const filter = document.getElementById('actionFilter').value;
  const filtered = actions.filter(a => {
    if (filter && a.priority !== filter) return false;
    return true;
  });

  if (!filtered.length) {
    document.getElementById('actionListContainer').innerHTML = '<div class="empty-state">No actions match this filter</div>';
    return;
  }

  const html = filtered.map(a => {
    const isOverdue = Number(a.daysLeft) < 0;
    const priClass = a.priority === 'High' ? 'high' : 'medium';
    return `<div class="action-card">
      <div class="action-card-body">
        <div class="action-priority-row">
          <div class="priority-dot ${priClass}"></div>
          <span class="priority-label ${priClass}">${a.priority}</span>
        </div>
        <div class="action-text">${a.description}</div>
      </div>
      <div class="action-footer">
        <span>Assigned: <strong>${a.assignedTo || '—'}</strong></span>
        <span>Due: <strong>W${a.weekDue}</strong></span>
        ${isOverdue ? `<span class="overdue-tag">${Math.abs(a.daysLeft)} days overdue</span>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('actionListContainer').innerHTML = html;
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function saveAction() {
  const desc = document.getElementById('newActionDesc').value.trim();
  if (!desc) { alert('Please enter a description'); return; }
  const body = {
    action: 'addAction',
    description: desc,
    priority: document.getElementById('newActionPriority').value,
    weekDue: document.getElementById('newActionWeek').value,
    area: document.getElementById('newActionArea').value,
    assignedTo: document.getElementById('newActionAssigned').value,
    raisedBy: currentUser.name,
  };
  const result = await api(body);
  if (result.ok) {
    actions.push({ ...body, actionId: result.id, status: 'Open', daysLeft: 0 });
    renderActions();
    closeModal();
    document.getElementById('newActionDesc').value = '';
  }
}

// ── Progress ─────────────────────────────────────────────────
function renderProgress() {
  const roles = [...new Set(tasks.map(t => t.role))];
  const html = roles.map(role => {
    const roleTasks = tasks.filter(t => t.role === role);
    const done = roleTasks.filter(t => statuses[t.taskId]?.status === 'done').length;
    const behind = roleTasks.filter(t => statuses[t.taskId]?.status === 'behind').length;
    const pct = roleTasks.length ? Math.round((done / roleTasks.length) * 100) : 0;
    const cls = pct >= 70 ? 'success' : pct >= 40 ? 'warning' : 'danger';
    const barColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
    return `<div class="role-row">
      <div class="role-row-top">
        <span class="role-row-name">${role}</span>
        <span class="role-row-pct ${cls}">${pct}%</span>
      </div>
      <div class="role-bar-wrap"><div class="role-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="role-row-meta">
        <span><strong>${done}</strong> done</span>
        <span><strong>${behind}</strong> behind</span>
        <span><strong>${roleTasks.length - done - behind}</strong> not started</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('progressContainer').innerHTML = html || '<div class="empty-state">No data yet</div>';
}

// ── Tabs ─────────────────────────────────────────────────────
function showTab(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  el.classList.add('active');
}

// ── Boot ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const stored = sessionStorage.getItem('srdUser');
  if (stored) {
    currentUser = JSON.parse(stored);
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    initApp();
  }
});
</script>
</body>
</html>
